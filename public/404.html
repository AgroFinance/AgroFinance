<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AgroFinance</title>
  <script type="text/javascript">
    // GitHub Pages SPA redirect — redirige rutas directas al index para que
    // Next.js maneje el routing del lado del cliente.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
